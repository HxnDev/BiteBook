name: OTA update (EAS)

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/eas-update.yml"

jobs:
  update:
    name: Publish update to preview channel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish OTA update
        working-directory: apps/mobile
        env:
          # Same publishable values as eas.json — baked into the JS bundle.
          EXPO_PUBLIC_BITEBOOK_API_URL: https://script.google.com/macros/s/AKfycbxNe9MUfpvO6pbkVv3uHh95zD9udKFMrf1Y1imCr9QJJa90DaN5Hhe9q_7GPxKV_9FsYA/exec
          EXPO_PUBLIC_BITEBOOK_API_SECRET: 997732b21c9e460b8c74696e3016177cb1b2ba5fcf6fa249
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          eas update --channel preview --non-interactive \
            --message "${COMMIT_MESSAGE%%$'\n'*}"
