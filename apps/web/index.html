<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      (function () {
        var stored = localStorage.getItem("bitebook-theme");
        var dark =
          stored === "dark" ||
          (!stored && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <meta name="theme-color" content="#fffdfa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0a08" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="BiteBook — your recipes, beautifully kept. A personal recipe book with macros, photos and serving calculations."
    />
    <title>BiteBook — Your recipes, beautifully kept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Inter:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
